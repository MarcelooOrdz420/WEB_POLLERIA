## Ajuste para PCs con poca RAM (evita crashes del daemon por falta de memoria).
## Si tu PC tiene mas RAM, puedes subirlo gradualmente.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
android.useAndroidX=true

# En Windows, el watcher de Gradle a veces deja locks en cachés (transforms) y rompe el build.
org.gradle.vfs.watch=false
